<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | GreenLoop 3.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #004d38 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .container { padding: 40px; }
        h1 { font-size: 8rem; opacity: 0.3; margin-bottom: 20px; }
        h2 { font-size: 1.5rem; margin-bottom: 20px; }
        p { opacity: 0.8; margin-bottom: 30px; }
        a {
            display: inline-block;
            background: white;
            color: #006a4e;
            padding: 14px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s;
        }
        a:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/">Return to GreenLoop 3.0</a>
    </div>
</body>
</html>
